name: Verify v1.2.0 Release

on:
  push:
    branches:
      - "release/v1.2.0"
    paths:
      - ".github/workflows/verify-release-v1.2.0.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify release and IPA asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_JSON="$(gh release view v1.2.0 --json tagName,url,isDraft,isPrerelease,assets)"
          echo "$RELEASE_JSON" | jq -e '.tagName == "v1.2.0"'
          echo "$RELEASE_JSON" | jq -e '.isDraft == false and .isPrerelease == false'
          echo "$RELEASE_JSON" | jq -e '.assets[] | select(.name == "SatuDulu-v1.2.0-build-4-unsigned.ipa")'
          mkdir -p docs/releases
          echo "$RELEASE_JSON" | jq '.' > docs/releases/v1.2.0.json

      - name: Commit verification receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/v1.2.0.json
          git commit -m "chore: record verified v1.2.0 release" || exit 0
          git push origin HEAD:release/v1.2.0
