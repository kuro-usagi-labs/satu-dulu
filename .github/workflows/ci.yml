name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: dart format --output=none --set-exit-if-changed .
      - name: Run analyzer for diagnostics
        id: analyze
        continue-on-error: true
        run: flutter analyze > analyze.log 2>&1
      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-analyzer-log
          path: analyze.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce analyzer result
        if: steps.analyze.outcome == 'failure'
        run: |
          cat analyze.log
          exit 1
      - run: flutter test --coverage
