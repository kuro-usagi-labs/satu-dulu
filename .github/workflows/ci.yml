name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - name: Run tests for diagnostics
        id: tests
        continue-on-error: true
        run: flutter test --coverage > test.log 2>&1
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-ref-test-log
          path: test.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: |
          cat test.log
          exit 1
