name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - name: Apply Dart formatting
        run: dart format .
      - name: Commit generated and formatted sources
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          if ! git diff --cached --quiet; then
            git commit -m "style: generate and format anti-lupa sources"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - run: dart format --output=none --set-exit-if-changed .
      - name: Run analyzer for diagnostics
        id: analyze
        continue-on-error: true
        run: flutter analyze > analyze.log 2>&1
      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anti-lupa-analyzer-log
          path: analyze.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce analyzer result
        if: steps.analyze.outcome == 'failure'
        run: |
          cat analyze.log
          exit 1
      - run: flutter test --coverage
